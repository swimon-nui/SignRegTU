<!DOCTYPE html>
<html lang="th">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Signature REG TU</title>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@5.0.10/dist/signature_pad.umd.min.js"></script>

<style>
:root{
    --w:1134px;
    --h:284px;
}

body{
    margin:0;
    padding:20px;
    font-family:sans-serif;
    background:#f5f5f5;
    text-align:center;
}

input{
    width:90%;
    max-width:700px;
    padding:14px;
    font-size:20px;
    text-align:center;
    border-radius:10px;
    border:2px solid #999;
    margin-bottom:20px;
}

.stack{
    display:flex;
    flex-direction:column;
    gap:20px;
    align-items:center;
}

.card{
    background:#fff;
    padding:15px;
    border-radius:10px;
    box-shadow:0 1px 6px rgba(0,0,0,.1);
}

canvas{
    border:1px solid #ccc;
    background:#fff;
    width:var(--w);
    height:var(--h);
    touch-action:none;
    /* ป้องกัน Safari และ iPad รบกวน Apple Pencil */
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
}

button{
    margin:6px;
    padding:8px 14px;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

.save{background:#198754;color:#fff;}
.clear{background:#6c757d;color:#fff;}

</style>
</head>

<body>

<h2>Signature REG TU</h2>

<input id="filename" placeholder="ตั้งชื่อไฟล์">

<div class="stack" id="stack"></div>

<script>
const W = 1134;
const H = 284;
const DPI = 600;

const pads = [];
const stack = document.getElementById("stack");

function setupCanvas(canvas){
    const ratio = Math.max(window.devicePixelRatio || 1, 1);

    canvas.width = W * ratio;
    canvas.height = H * ratio;

    canvas.style.width = W + "px";
    canvas.style.height = H + "px";

    const ctx = canvas.getContext("2d");
    ctx.setTransform(1,0,0,1,0,0);
    ctx.scale(ratio, ratio);
}

function createPad(index,label,suffix){

    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
        <div><b>${label}</b></div>
        <canvas id="c${index}"></canvas>
        <div>
            <button class="clear" onclick="clearPad(${index})">Clear</button>
            <button class="save" onclick="save(${index})">Save</button>
        </div>
    `;

    stack.appendChild(div);

    const canvas = document.getElementById("c"+index);
    setupCanvas(canvas);

const pad = new SignaturePad(canvas,{

    penColor:"#000",

    backgroundColor:"rgba(255,255,255,0)",

    minWidth:1.5,

    maxWidth:5,

    velocityFilterWeight:0.9,

    throttle:0,

    minDistance:0.3

});

    pads[index] = {pad, canvas, suffix};
}

function clearPad(i){
    pads[i].pad.clear();
}


// ---------------------------------
// ฟังก์ชันเขียน Metadata 600 DPI ลง PNG (อัปเดตใหม่)
// ---------------------------------
const crcTable = [];
for (let i = 0; i < 256; i++) {
    let c = i;
    for (let j = 0; j < 8; j++) {
        if (c & 1) c = 0xedb88320 ^ (c >>> 1);
        else c = c >>> 1;
    }
    crcTable[i] = c;
}

function crc32(buf) {
    let c = 0xffffffff;
    for (let i = 0; i < buf.length; i++) {
        c = crcTable[(c ^ buf[i]) & 0xff] ^ (c >>> 8);
    }
    return c ^ 0xffffffff;
}

function setDPI(blob, dpi) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = function(e) {
            const buffer = e.target.result;
            const uint8 = new Uint8Array(buffer);
            const dataView = new DataView(buffer);

            // เช็คว่าเป็นไฟล์ PNG หรือไม่
            if (uint8[0] !== 0x89 || uint8[1] !== 0x50 || uint8[2] !== 0x4E || uint8[3] !== 0x47) {
                return resolve(blob);
            }

            const chunks = [];
            let offset = 8;
            while (offset < uint8.length) {
                const length = dataView.getUint32(offset);
                const type = String.fromCharCode(uint8[offset+4], uint8[offset+5], uint8[offset+6], uint8[offset+7]);
                const chunk = uint8.slice(offset, offset + 12 + length);
                chunks.push({ type, data: chunk });
                offset += 12 + length;
            }

            // คำนวณ Pixels Per Meter (PPM) สำหรับ DPI ที่ระบุ
            const ppm = Math.round(dpi / 0.0254);
            
            // สร้าง pHYs Chunk (บอกความละเอียด DPI)
            const physChunk = new Uint8Array(21);
            const physView = new DataView(physChunk.buffer);
            physView.setUint32(0, 9); // ความยาวข้อมูล
            physChunk.set([112, 72, 89, 115], 4); // ชื่อ Chunk "pHYs"
            physView.setUint32(8, ppm); // X
            physView.setUint32(12, ppm); // Y
            physChunk[16] = 1; // หน่วยเป็นเมตร

            // คำนวณ CRC 
            const crc = crc32(physChunk.slice(4, 17));
            physView.setUint32(17, crc);

            // ประกอบ Chunk คืนเข้าด้วยกัน
            let newChunks = [uint8.slice(0, 8)];
            for (let i = 0; i < chunks.length; i++) {
                if (chunks[i].type === 'pHYs') continue; // เอาอันเก่าทิ้งถ้ามี
                newChunks.push(chunks[i].data);
                if (chunks[i].type === 'IHDR') {
                    newChunks.push(physChunk); // ยัด pHYs ต่อจาก IHDR
                }
            }

            resolve(new Blob(newChunks, { type: 'image/png' }));
        };
        reader.readAsArrayBuffer(blob);
    });
}

function getStrokeBounds(data){
    let minX = Infinity;
    let minY = Infinity;
    let maxX = -Infinity;
    let maxY = -Infinity;

    data.forEach(stroke=>{
        stroke.points.forEach(p=>{
            if(p.x<minX) minX=p.x;
            if(p.y<minY) minY=p.y;
            if(p.x>maxX) maxX=p.x;
            if(p.y>maxY) maxY=p.y;
        });
    });

    if(minX===Infinity) return null;

    return{
        minX,
        minY,
        maxX,
        maxY
    };
}    

function createExportCanvas(signaturePad){
    const data = signaturePad.toData();

    const out = document.createElement("canvas");
    out.width = W;
    out.height = H;

    if(data.length===0){
        return out;
    }

    let minX = Infinity;
    let minY = Infinity;
    let maxX = -Infinity;
    let maxY = -Infinity;

    data.forEach(stroke=>{
        stroke.points.forEach(p=>{
            minX = Math.min(minX,p.x);
            minY = Math.min(minY,p.y);
            maxX = Math.max(maxX,p.x);
            maxY = Math.max(maxY,p.y);
        });
    });

    const signWidth = maxX-minX;
    const signHeight = maxY-minY;

    const margin = 20;
    const usableWidth = W - margin*2;
    const usableHeight = H - margin*2;

    const scale = Math.min(
        usableWidth/signWidth,
        usableHeight/signHeight,
        1
    );

    const offsetX = (W-signWidth*scale)/2;
    const offsetY = (H-signHeight*scale)/2;

    const newData = data.map(stroke=>({
        ...stroke,
        points: stroke.points.map(p=>({
            ...p,
            x: (p.x-minX)*scale +offsetX,
            y: (p.y-minY)*scale +offsetY
        }))
    }));

    const exportPad = new SignaturePad(out,{
        penColor:"#000",
        backgroundColor:"rgba(255,255,255,0)",
        minWidth:signaturePad.minWidth*scale,
        maxWidth:signaturePad.maxWidth*scale
    });

    exportPad.fromData(newData);
    return out;
}
    
function save(i){
    const pad = pads[i].pad;
    if(pad.isEmpty()){
        alert("กรุณาเซ็นก่อน");
        return;
    }

    const exportCanvas = createExportCanvas(pads[i].pad);

    // เซฟเป็น PNG และฝัง 600 DPI (อัปเดตใหม่)
    exportCanvas.toBlob(async blob=>{
        
        const finalBlob = await setDPI(blob, DPI);
        
        const name = (document.getElementById("filename").value || "signature")
            .replace(/[\\/:*?"<>|]/g,"");

        const url = URL.createObjectURL(finalBlob);

        const a = document.createElement("a");
        a.href = url;
        a.download = name + "_" + pads[i].suffix + ".png";

        a.click();

        URL.revokeObjectURL(url);

    }, "image/png");

}

// create 2 pads
createPad(0,"ลายเซ็นภาษาไทย","TH");
createPad(1,"Signature English","EN");

</script>

</body>
</html>
